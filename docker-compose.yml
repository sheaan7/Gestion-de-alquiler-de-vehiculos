services:
  mysql:
    image: mysql:8.4
    container_name: mysql-alquiler
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: alquiler
      MYSQL_USER: alquiler
      MYSQL_PASSWORD: alquiler
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - datos-mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - red-alquiler

  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    restart: unless-stopped
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - red-alquiler

  servicio-vehiculos:
    build: ./servicio-vehiculos
    container_name: servicio-vehiculos
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - red-alquiler

  servicio-operaciones:
    build: ./servicio-operaciones
    container_name: servicio-operaciones
    restart: unless-stopped
    depends_on:
      eureka-server:
        condition: service_healthy
      servicio-vehiculos:
        condition: service_healthy
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - red-alquiler

  gateway:
    build: ./gateway
    container_name: gateway
    restart: unless-stopped
    depends_on:
      eureka-server:
        condition: service_healthy
      servicio-vehiculos:
        condition: service_healthy
      servicio-operaciones:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - red-alquiler

  frontend:
    build: ./frontend
    container_name: frontend
    restart: unless-stopped
    environment:
      - URL_GATEWAY=http://gateway:8080
    depends_on:
      gateway:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - red-alquiler

networks:
  red-alquiler:
    driver: bridge

volumes:
  datos-mysql:
