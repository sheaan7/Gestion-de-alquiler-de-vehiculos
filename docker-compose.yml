services:
  db:
    image: mysql:8.4
    container_name: mysql-alquiler
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: vehiculos
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - datos-mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - red-alquiler

  phpmyadmin:
    image: phpmyadmin:5-apache
    container_name: phpmyadmin-alquiler
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8085:80"
    networks:
      - red-alquiler

  servicio-vehiculos:
    build: ./servicio-vehiculos
    container_name: servicio-vehiculos
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://root:root@db:3306/vehiculos
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/api/vehiculos')\""]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - red-alquiler

  servicio-operaciones:
    build: ./servicio-operaciones
    container_name: servicio-operaciones
    restart: unless-stopped
    environment:
      VEHICULOS_URL: http://servicio-vehiculos:8001
      DATABASE_URL: mysql+pymysql://root:root@db:3306/vehiculos
    depends_on:
      db:
        condition: service_healthy
      servicio-vehiculos:
        condition: service_healthy
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/api/operaciones')\""]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - red-alquiler

  servicio-clientes:
    build: ./servicio-clientes
    container_name: servicio-clientes
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://root:root@db:3306/vehiculos
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8003:8003"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8003/api/clientes')\""]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - red-alquiler

  gateway:
    build: ./gateway
    container_name: gateway
    restart: unless-stopped
    depends_on:
      servicio-vehiculos:
        condition: service_healthy
      servicio-operaciones:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - red-alquiler

  frontend:
    build: ./frontend
    container_name: frontend
    restart: unless-stopped
    environment:
      - URL_GATEWAY=http://gateway:8080
    depends_on:
      - gateway
    ports:
      - "3000:3000"
    networks:
      - red-alquiler

networks:
  red-alquiler:
    driver: bridge

volumes:
  datos-mysql:
