events {
    worker_connections 1024;
}

http {
    # DNS del daemon de Docker — resuelve nombres de contenedores en tiempo de request
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 8080;

        location /api/operaciones {
            set $upstream_operaciones http://servicio-operaciones:8002;
            proxy_pass $upstream_operaciones;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/vehiculos {
            set $upstream_vehiculos http://servicio-vehiculos:8001;
            proxy_pass $upstream_vehiculos;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Variable fuerza resolución lazy: nginx arranca aunque servicio-clientes no exista aún
        location /api/clientes {
            set $upstream_clientes http://servicio-clientes:8003;
            proxy_pass $upstream_clientes;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/contratos {
            set $upstream_operaciones http://servicio-operaciones:8002;
            proxy_pass $upstream_operaciones;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/reservas {
            set $upstream_operaciones http://servicio-operaciones:8002;
            proxy_pass $upstream_operaciones;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/devoluciones {
            set $upstream_operaciones http://servicio-operaciones:8002;
            proxy_pass $upstream_operaciones;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/mantenimientos {
            set $upstream_vehiculos http://servicio-vehiculos:8001;
            proxy_pass $upstream_vehiculos;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
